<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilombo Digital - Login</title>
    <!-- Ligação com a folha de estilos -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="tela-login">
    <!-- Formulário de Login Centralizado -->
    <main class="card-login">
        <h1 style="color: #C5A059;">Quilombo Digital</h1>
        <p>Acesse sua conta</p>
        
        <form action="painel.html" method="GET">
            <div class="campo" style="text-align: left;">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
            </div>
            <div class="campo" style="text-align: left;">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="botao" style="width: 100%; margin-top: 10px;">Entrar</button>
        </form>
        
        <p style="margin-top: 20px;">
            <a href="index.html" style="color: #FFFFFF; text-decoration: none;">&larr; Voltar à página inicial</a>
        </p>
        <p class="aviso" style="color: #ccc;">Aviso: Acesso visual apenas para fins de protótipo.</p>
    </main>
</body>
</html>
